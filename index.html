<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Denní menu – Brno</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
      background: #f0f2f5;
    }

    /* ── Top bar ─────────────────────────────────────────── */
    #topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: #1558b0;
      color: #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,.25);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    #topbar-title { flex-shrink: 0; }
    #topbar-title h1 { font-size: 1rem; font-weight: 700; line-height: 1.2; }
    #topbar-title .subtitle { font-size: 0.72rem; opacity: .75; }

    #search-row { display: flex; gap: 6px; flex: 1; min-width: 200px; }

    #search-input {
      flex: 1;
      padding: 7px 12px;
      border: none;
      border-radius: 20px;
      font-size: 0.88rem;
      outline: none;
      min-width: 0;
    }

    .topbtn {
      padding: 7px 13px;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 500;
      white-space: nowrap;
      background: rgba(255,255,255,.2);
      color: #fff;
      transition: background .15s;
    }
    .topbtn:hover  { background: rgba(255,255,255,.32); }
    .topbtn:active { background: rgba(255,255,255,.4); }

    #radius-wrap { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    #radius-wrap label { font-size: 0.8rem; opacity: .8; }
    #radius-select {
      padding: 5px 8px;
      border: none;
      border-radius: 12px;
      font-size: 0.82rem;
      cursor: pointer;
      background: rgba(255,255,255,.9);
      color: #333;
    }

    /* ── Main layout ─────────────────────────────────────── */
    #main { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ─────────────────────────────────────────── */
    #sidebar {
      width: 300px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: #fff;
      box-shadow: 2px 0 8px rgba(0,0,0,.08);
      overflow: hidden;
      z-index: 100;
    }

    #sidebar-header {
      padding: 9px 14px;
      font-size: 0.76rem;
      color: #666;
      background: #f7f8fa;
      border-bottom: 1px solid #eee;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #spinner {
      width: 12px; height: 12px;
      border: 2px solid #ccc;
      border-top-color: #1558b0;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Progress bar */
    #progress-wrap {
      padding: 0 14px 7px;
      background: #f7f8fa;
      border-bottom: 1px solid #eee;
      flex-shrink: 0;
      display: none;
    }
    #progress-track {
      height: 4px;
      background: #e0e0e0;
      border-radius: 2px;
      overflow: hidden;
    }
    #progress-fill {
      height: 100%;
      background: #1558b0;
      width: 0%;
      transition: width .25s;
    }
    #progress-text {
      font-size: 0.68rem;
      color: #aaa;
      margin-top: 3px;
    }

    #restaurant-list { overflow-y: auto; flex: 1; }

    /* ── Restaurant card ─────────────────────────────────── */
    .rcard {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      padding: 11px 14px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
      transition: background .12s;
      border-left: 3px solid transparent;
    }
    .rcard:hover  { background: #f3f7ff; }
    .rcard.active { background: #ebf1ff; border-left-color: #1558b0; }

    .rcard-info { flex: 1; min-width: 0; }
    .rcard-name {
      font-size: 0.9rem;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .rcard-address { font-size: 0.73rem; color: #888; margin-bottom: 4px; line-height: 1.3; }
    .rcard-dist    { font-size: 0.69rem; color: #bbb; }

    .rcard-web { flex-shrink: 0; margin-top: 2px; }
    .menu-link {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 4px 9px;
      background: #1558b0;
      color: #fff;
      font-size: 0.71rem;
      font-weight: 500;
      border-radius: 12px;
      text-decoration: none;
      white-space: nowrap;
      transition: background .13s;
    }
    .menu-link:hover { background: #0f44a0; }
    .menu-link.main-site { background: #6a8fd8; }
    .menu-link.main-site:hover { background: #5577c0; }

    /* ── Empty / error ───────────────────────────────────── */
    .state-msg {
      padding: 24px 16px;
      color: #aaa;
      font-size: 0.83rem;
      text-align: center;
      line-height: 1.7;
    }
    .retry-btn {
      display: inline-block;
      margin-top: 10px;
      padding: 6px 16px;
      background: #1558b0;
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 0.82rem;
      cursor: pointer;
    }
    .retry-btn:hover { background: #0f44a0; }

    /* ── Map ─────────────────────────────────────────────── */
    #map { flex: 1; }

    /* ── Popup ───────────────────────────────────────────── */
    .pu { font-size: 0.84rem; line-height: 1.45; max-width: 240px; }
    .pu-name { font-weight: 700; font-size: 0.95rem; margin-bottom: 3px; }
    .pu-addr { color: #888; font-size: 0.73rem; margin-bottom: 10px; }
    .pu-link {
      display: inline-block;
      padding: 5px 12px;
      background: #1558b0;
      color: #fff;
      font-size: 0.76rem;
      font-weight: 500;
      border-radius: 12px;
      text-decoration: none;
    }
    .pu-link:hover { background: #0f44a0; }

    /* ── Location dot ────────────────────────────────────── */
    .loc-dot {
      width: 14px; height: 14px;
      background: #1558b0;
      border: 3px solid #fff;
      border-radius: 50%;
      box-shadow: 0 1px 5px rgba(0,0,0,.5);
    }

    /* ── Responsive ──────────────────────────────────────── */
    @media (max-width: 660px) {
      #main { flex-direction: column-reverse; }
      #sidebar { width: 100%; height: 44dvh; box-shadow: 0 -2px 8px rgba(0,0,0,.1); }
      #radius-wrap label { display: none; }
    }
  </style>
</head>
<body>

<div id="topbar">
  <div id="topbar-title">
    <h1>Denní menu v okolí</h1>
    <div class="subtitle" id="center-label">Jakubské náměstí, Brno</div>
  </div>
  <div id="search-row">
    <input id="search-input" type="text" placeholder="Hledat adresu…" autocomplete="off">
    <button class="topbtn" id="search-btn">Hledat</button>
    <button class="topbtn" id="locate-btn" title="Použít moji polohu">📍</button>
  </div>
  <div id="radius-wrap">
    <label for="radius-select">Radius:</label>
    <select id="radius-select">
      <option value="402">0.25 mi</option>
      <option value="804" selected>0.5 mi</option>
      <option value="1609">1 mi</option>
      <option value="3219">2 mi</option>
    </select>
  </div>
</div>

<div id="main">
  <div id="sidebar">
    <div id="sidebar-header">
      <div id="spinner"></div>
      <span id="sidebar-text">Načítání…</span>
    </div>
    <div id="progress-wrap">
      <div id="progress-track"><div id="progress-fill"></div></div>
      <div id="progress-text"></div>
    </div>
    <div id="restaurant-list"></div>
  </div>
  <div id="map"></div>
</div>

<script>
// ── Config ───────────────────────────────────────────────────
const DEFAULT_LAT = 49.1958;
const DEFAULT_LNG = 16.6101;
const CONCURRENCY  = 8;
const CACHE_TTL_MS = 4 * 3600 * 1000; // 4 hours

const OVERPASS_MIRRORS = [
  "https://overpass-api.de/api/interpreter",
  "https://overpass.kumi.systems/api/interpreter",
];

// CORS proxies — tried in order, first that succeeds wins
const PROXY_FNS = [
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
];

// Keywords that indicate a daily/weekly lunch menu exists on the page
const MENU_KEYWORDS = [
  'denní menu', 'denni menu',
  'týdenní menu', 'tydenni menu',
  'polední menu', 'poledni menu',
  'obědové menu', 'obedove menu',
  'lunch menu',
];

// Substrings in href that strongly suggest a direct menu page
const MENU_HREF_HINTS = [
  'denni-menu', 'denni_menu',
  'poledni-menu', 'poledni_menu',
  'tydenni-menu', 'tydenni_menu',
  'obedove-menu', 'lunch-menu',
  'menu/poledni', 'poledni/menu',
];

// ── Map setup ────────────────────────────────────────────────
const map = L.map("map").setView([DEFAULT_LAT, DEFAULT_LNG], 16);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom: 19,
}).addTo(map);

// ── State ────────────────────────────────────────────────────
let centerLat    = DEFAULT_LAT;
let centerLng    = DEFAULT_LNG;
let radiusMeters = 804;
let markers      = [];
let centerMarker = null;
let radiusCircle = null;
let fetchTimer   = null;

// ── Icons ────────────────────────────────────────────────────
function makePin(fill) {
  return L.divIcon({
    className: "",
    html: `<svg xmlns="http://www.w3.org/2000/svg" width="26" height="36" viewBox="0 0 26 36">
      <path d="M13 0C5.82 0 0 5.82 0 13c0 8.94 13 23 13 23S26 21.94 26 13C26 5.82 20.18 0 13 0z"
            fill="${fill}" stroke="#fff" stroke-width="2"/>
      <circle cx="13" cy="13" r="4.5" fill="#fff"/>
    </svg>`,
    iconSize: [26, 36], iconAnchor: [13, 36], popupAnchor: [0, -38],
  });
}
const pinBlue = makePin("#1558b0");
const pinRed  = makePin("#c62828");
const locIcon = L.divIcon({
  className: "",
  html: '<div class="loc-dot"></div>',
  iconSize: [14, 14], iconAnchor: [7, 7],
});

// ── Distance (metres) ─────────────────────────────────────────
function distM(lat1, lon1, lat2, lon2) {
  const R = 6371000, r = Math.PI / 180;
  const dLat = (lat2 - lat1) * r, dLon = (lon2 - lon1) * r;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1*r) * Math.cos(lat2*r) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function fmtDist(m) {
  return `${(m / 1609.344).toFixed(2)} mi / ${Math.round(m)} m`;
}

// ── Overpass ──────────────────────────────────────────────────
function buildQuery(lat, lng, radius) {
  return `[out:json][timeout:25];
(
  node["amenity"="restaurant"](around:${radius},${lat},${lng});
  way["amenity"="restaurant"](around:${radius},${lat},${lng});
  relation["amenity"="restaurant"](around:${radius},${lat},${lng});
);
out center tags;`;
}

function parseRestaurants(elements) {
  return elements.map(el => {
    const t   = el.tags || {};
    const lat = el.lat ?? el.center?.lat;
    const lng = el.lon ?? el.center?.lon;
    if (!lat || !lng) return null;

    const street  = t["addr:street"] || "";
    const num     = t["addr:housenumber"] || "";
    const city    = t["addr:city"] || "";
    const address = [street && num ? `${street} ${num}` : (street || num), city]
      .filter(Boolean).join(", ");

    const website = t.website || t["contact:website"] || t.url || "";
    return { lat, lng, name: t.name || "(bez názvu)", address, website };
  }).filter(Boolean);
}

// ── Fetch helpers ─────────────────────────────────────────────
async function fetchWithTimeout(url, options = {}, ms = 10000) {
  const ctrl = new AbortController();
  const id   = setTimeout(() => ctrl.abort(), ms);
  try {
    return await fetch(url, { ...options, signal: ctrl.signal });
  } finally {
    clearTimeout(id);
  }
}

async function proxyFetch(url) {
  for (const fn of PROXY_FNS) {
    try {
      const r = await fetchWithTimeout(fn(url), {}, 9000);
      if (r.ok) return await r.text();
    } catch { /* try next proxy */ }
  }
  return null;
}

// ── Menu detection ────────────────────────────────────────────
function extractMenuLink(html, baseUrl) {
  let doc;
  try { doc = new DOMParser().parseFromString(html, "text/html"); }
  catch { return null; }

  let best = null, bestScore = 0;

  for (const a of doc.querySelectorAll("a[href]")) {
    const href = (a.getAttribute("href") || "").trim();
    const text = (a.textContent || "").toLowerCase().trim();
    if (!href || href.startsWith("#") || href.startsWith("javascript")) continue;

    let score = 0;
    if (MENU_HREF_HINTS.some(w => href.toLowerCase().includes(w))) score += 4;
    if (MENU_KEYWORDS.some(w => text.includes(w)))                  score += 2;
    // A /menu path by itself is a weak signal
    if (/\/menu\/?(?:\?|$)/i.test(href))                            score += 1;

    if (score > bestScore) { bestScore = score; best = href; }
  }

  if (!best || bestScore === 0) return null;
  try { return new URL(best, baseUrl).href; } catch { return null; }
}

async function checkWebsite(website) {
  const html = await proxyFetch(website);
  if (!html) return { hasMenu: false, menuUrl: null };

  const lower = html.toLowerCase();
  if (!MENU_KEYWORDS.some(k => lower.includes(k))) return { hasMenu: false, menuUrl: null };

  const menuUrl = extractMenuLink(html, website);
  return { hasMenu: true, menuUrl };
}

// ── Concurrency pool ──────────────────────────────────────────
async function concurrentMap(items, fn, limit) {
  const results = new Array(items.length);
  let i = 0;
  async function worker() {
    while (i < items.length) { const idx = i++; results[idx] = await fn(items[idx], idx); }
  }
  await Promise.all(Array.from({ length: Math.min(limit, items.length) }, worker));
  return results;
}

// ── Cache ─────────────────────────────────────────────────────
function cacheKey() {
  return `brnoMenus_${centerLat.toFixed(3)}_${centerLng.toFixed(3)}_${radiusMeters}`;
}
function loadCache() {
  try {
    const c = JSON.parse(localStorage.getItem(cacheKey()));
    if (c && Date.now() - c.ts < CACHE_TTL_MS) return c.data;
  } catch {}
  return null;
}
function saveCache(data) {
  try { localStorage.setItem(cacheKey(), JSON.stringify({ ts: Date.now(), data })); } catch {}
}

// ── UI helpers ────────────────────────────────────────────────
function setLoading(on) {
  document.getElementById("spinner").style.display = on ? "block" : "none";
}
function setHeader(text) {
  document.getElementById("sidebar-text").textContent = text;
}
function setProgress(done, total, label) {
  const wrap = document.getElementById("progress-wrap");
  if (total === 0) { wrap.style.display = "none"; return; }
  wrap.style.display = "block";
  document.getElementById("progress-fill").style.width = `${Math.round(done / total * 100)}%`;
  document.getElementById("progress-text").textContent = label;
}
function hideProgress() {
  document.getElementById("progress-wrap").style.display = "none";
}

// ── Build popup ───────────────────────────────────────────────
function buildPopup(r) {
  const isMenuPage = r.menuUrl && r.menuUrl !== r.website;
  const linkLabel  = isMenuPage ? "Otevřít denní menu →" : "Otevřít web restaurace →";
  return `<div class="pu">
    <div class="pu-name">${esc(r.name)}</div>
    <div class="pu-addr">${esc(r.address) || "adresa neznámá"}</div>
    <a class="pu-link" href="${esc(r.menuUrl)}" target="_blank" rel="noopener">${linkLabel}</a>
  </div>`;
}

// ── Build sidebar card ────────────────────────────────────────
function buildCard(r, idx) {
  const d = distM(centerLat, centerLng, r.lat, r.lng);
  const isMenuPage = r.menuUrl && r.menuUrl !== r.website;
  const linkClass  = isMenuPage ? "menu-link" : "menu-link main-site";
  const linkLabel  = isMenuPage ? "Denní menu ↗" : "Web ↗";

  const div = document.createElement("div");
  div.className   = "rcard";
  div.dataset.idx = idx;
  div.innerHTML = `
    <div class="rcard-info">
      <div class="rcard-name">${esc(r.name)}</div>
      <div class="rcard-address">${esc(r.address) || "adresa neznámá"}</div>
      <div class="rcard-dist">${fmtDist(d)}</div>
    </div>
    <div class="rcard-web">
      <a class="${linkClass}" href="${esc(r.menuUrl)}" target="_blank" rel="noopener"
         onclick="event.stopPropagation()">${linkLabel}</a>
    </div>`;
  div.addEventListener("click", () => focusRestaurant(idx));
  return div;
}

// ── Focus restaurant ──────────────────────────────────────────
function focusRestaurant(idx) {
  document.querySelectorAll(".rcard").forEach(c => c.classList.remove("active"));
  const card = document.querySelector(`.rcard[data-idx="${idx}"]`);
  card?.classList.add("active");
  card?.scrollIntoView({ behavior: "smooth", block: "nearest" });
  if (markers[idx]) {
    markers[idx].setIcon(pinRed);
    setTimeout(() => markers[idx]?.setIcon(pinBlue), 1600);
    map.setView(markers[idx].getLatLng(), 17, { animate: true });
    markers[idx].openPopup();
  }
}

// ── Render results ────────────────────────────────────────────
function renderRestaurants(list) {
  const el = document.getElementById("restaurant-list");
  el.innerHTML = "";
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  if (list.length === 0) {
    el.innerHTML = `<div class="state-msg">
      Žádné restaurace s denním menu nebyly nalezeny.<br>Zkuste zvětšit radius nebo jiný odkaz.
    </div>`;
    return;
  }

  list.forEach((r, i) => {
    const marker = L.marker([r.lat, r.lng], { icon: pinBlue })
      .addTo(map)
      .bindPopup(buildPopup(r), { maxWidth: 260 });

    marker.on("popupopen", () => {
      document.querySelectorAll(".rcard").forEach(c => c.classList.remove("active"));
      document.querySelector(`.rcard[data-idx="${i}"]`)
        ?.classList.add("active");
    });

    markers.push(marker);
    el.appendChild(buildCard(r, i));
  });
}

// ── Main fetch ────────────────────────────────────────────────
async function fetchRestaurants() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  document.getElementById("restaurant-list").innerHTML = "";
  hideProgress();

  // 1. Check cache
  const cached = loadCache();
  if (cached) {
    renderRestaurants(cached);
    setHeader(`${cached.length} restaurací s denním menu • z mezipaměti`);
    return;
  }

  // 2. Fetch from Overpass
  setLoading(true);
  setHeader("Hledám restaurace v okolí…");

  let osmRestaurants = [];
  let overpassErr;

  for (const mirror of OVERPASS_MIRRORS) {
    try {
      const res = await fetchWithTimeout(
        mirror,
        { method: "POST", body: "data=" + encodeURIComponent(buildQuery(centerLat, centerLng, radiusMeters)) },
        20000
      );
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      osmRestaurants = parseRestaurants(data.elements);
      overpassErr = null;
      break;
    } catch (e) { overpassErr = e; }
  }

  if (overpassErr) {
    setLoading(false);
    setHeader("⚠ Chyba při načítání dat");
    document.getElementById("restaurant-list").innerHTML =
      `<div class="state-msg">Nepodařilo se načíst data z OpenStreetMap.<br>
      <small>${esc(overpassErr.message)}</small><br>
      <button class="retry-btn" onclick="fetchRestaurants()">Zkusit znovu</button></div>`;
    return;
  }

  // Sort by distance; keep only those with a website URL
  osmRestaurants.sort((a, b) =>
    distM(centerLat, centerLng, a.lat, a.lng) - distM(centerLat, centerLng, b.lat, b.lng)
  );
  const withSite = osmRestaurants.filter(r => r.website);

  // 3. Check each website for daily menu keywords
  setHeader(`Kontroluji weby restaurací…`);
  setProgress(0, withSite.length, `0 / ${withSite.length} zkontrolováno`);

  let done = 0;
  const checked = await concurrentMap(withSite, async r => {
    const result = await checkWebsite(r.website);
    done++;
    setProgress(done, withSite.length, `${done} / ${withSite.length} zkontrolováno`);
    return { ...r, ...result };
  }, CONCURRENCY);

  // 4. Keep only confirmed restaurants; use menuUrl or fall back to website
  const confirmed = checked
    .filter(r => r.hasMenu)
    .map(r => ({ ...r, menuUrl: r.menuUrl || r.website }));

  saveCache(confirmed);
  hideProgress();
  setLoading(false);
  renderRestaurants(confirmed);

  const note = withSite.length < osmRestaurants.length
    ? ` • ${osmRestaurants.length - withSite.length} bez webu přeskočeno`
    : "";
  setHeader(`${confirmed.length} restaurací s denním menu${note}`);
}

// ── Map overlay (center marker + radius circle) ───────────────
function updateMapOverlay() {
  if (centerMarker) map.removeLayer(centerMarker);
  if (radiusCircle)  map.removeLayer(radiusCircle);

  centerMarker = L.marker([centerLat, centerLng], { icon: locIcon })
    .addTo(map)
    .bindPopup(document.getElementById("center-label").textContent);

  radiusCircle = L.circle([centerLat, centerLng], {
    radius: radiusMeters,
    color: "#1558b0",
    weight: 1.5,
    fillOpacity: 0.05,
  }).addTo(map);

  map.fitBounds(radiusCircle.getBounds(), { padding: [24, 24], maxZoom: 16, animate: true });
}

// ── Set center and refresh ────────────────────────────────────
function setCenter(lat, lng, label) {
  centerLat = lat; centerLng = lng;
  document.getElementById("center-label").textContent = label || `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
  updateMapOverlay();
  clearTimeout(fetchTimer);
  fetchRestaurants();
}

// ── Geolocation ───────────────────────────────────────────────
document.getElementById("locate-btn").addEventListener("click", () => {
  if (!navigator.geolocation) { alert("Geolokace není dostupná."); return; }
  navigator.geolocation.getCurrentPosition(
    p => setCenter(p.coords.latitude, p.coords.longitude, "Moje poloha"),
    e => alert("Chyba geolokace: " + e.message),
    { enableHighAccuracy: true, timeout: 8000 }
  );
});

// ── Address search ────────────────────────────────────────────
async function searchAddress() {
  const raw = document.getElementById("search-input").value.trim();
  if (!raw) return;
  const q = /brno/i.test(raw) ? raw : raw + ", Brno";
  try {
    const res  = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1`,
      { headers: { "Accept-Language": "cs" } });
    const data = await res.json();
    if (data.length) setCenter(parseFloat(data[0].lat), parseFloat(data[0].lon), data[0].display_name.split(",")[0]);
    else alert(`Adresa nenalezena: "${raw}"`);
  } catch { alert("Chyba při hledání adresy."); }
}
document.getElementById("search-btn").addEventListener("click", searchAddress);
document.getElementById("search-input").addEventListener("keydown", e => {
  if (e.key === "Enter") searchAddress();
});

// ── Radius change ─────────────────────────────────────────────
document.getElementById("radius-select").addEventListener("change", e => {
  radiusMeters = parseInt(e.target.value);
  updateMapOverlay();
  clearTimeout(fetchTimer);
  fetchTimer = setTimeout(fetchRestaurants, 300);
});

// ── XSS helper ────────────────────────────────────────────────
function esc(str) {
  if (!str) return "";
  return String(str)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;")
    .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

// ── Boot ──────────────────────────────────────────────────────
updateMapOverlay();
fetchRestaurants();
</script>
